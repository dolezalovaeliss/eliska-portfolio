  <script>
    // Duplicate the carousel tiles so the marquee loops seamlessly
    (function () {
      var t = document.getElementById('lhero-track');
      if (!t) return;
      var clone = t.cloneNode(true);
      clone.removeAttribute('id');
      clone.setAttribute('aria-hidden', 'true');
      clone.querySelectorAll('a').forEach(function (a) { a.setAttribute('tabindex', '-1'); });
      // append the clone's children into the same track for one continuous flex row
      while (clone.firstChild) t.appendChild(clone.firstChild);
    })();
  </script>
