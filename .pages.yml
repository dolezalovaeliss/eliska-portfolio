# Pages CMS configuration
# Edit content via https://pagescms.org after signing in with GitHub.

site:
  url: https://eliskadolezalova.netlify.app

content:
  - name: site
    label: Site content
    path: content/site.json
    type: file
    fields:
      - name: bubble_role_en
        label: Bubble text (English)
        description: The line shown in the hero chat-bubble hover card when site is in English mode.
        type: string
      - name: bubble_role_cs
        label: Bubble text (Czech)
        description: The line shown in the hero chat-bubble hover card when site is in Czech mode.
        type: string
