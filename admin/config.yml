backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://eliskadolezalova.netlify.app
display_url: https://eliskadolezalova.netlify.app
logo_url: https://eliskadolezalova.netlify.app/favicon.svg

collections:
  - name: "site"
    label: "Site content"
    description: "Editable text across the site. Save = commit + redeploy automatically."
    files:
      - file: "content/site.json"
        name: "site"
        label: "Hero bubble (homepage)"
        fields:
          - label: "Bubble role text (English)"
            name: "bubble_role_en"
            widget: "string"
            hint: "The line in the hero chat bubble in English mode."
          - label: "Bubble role text (Czech)"
            name: "bubble_role_cs"
            widget: "string"
            hint: "The line in the hero chat bubble in Czech mode."
